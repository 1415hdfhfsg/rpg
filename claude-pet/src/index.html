<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Pet</title>
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  background: transparent;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}

:root {
  --pet-primary: #cbbeff;
  --pet-primary-dark: #a78bfa;
  --pet-glow: rgba(203, 190, 255, 0.4);
  --pet-size: 120px;
}

/* ===== PET CONTAINER ===== */
#pet-container {
  position: fixed;
  width: var(--pet-size);
  height: calc(var(--pet-size) + 20px);
  cursor: grab;
  transition: opacity 0.3s ease;
  filter: drop-shadow(0 4px 12px var(--pet-glow));
}
#pet-container:hover { opacity: 0.65; }
#pet-container:active { cursor: grabbing; }
#pet-container.minimized {
  width: 30px !important; height: 30px !important;
}

/* ===== CHARACTER SVG ===== */
.claude-body {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}

/* Sparkle symbol */
.sparkle {
  font-size: calc(var(--pet-size) * 0.3);
  color: var(--pet-primary);
  text-shadow: 0 0 12px var(--pet-glow);
  transition: color 0.5s ease, text-shadow 0.5s ease;
  line-height: 1;
}

/* Face */
.face {
  position: relative;
  width: calc(var(--pet-size) * 0.55);
  height: calc(var(--pet-size) * 0.35);
  display: flex; align-items: center; justify-content: center;
  gap: calc(var(--pet-size) * 0.12);
}
.eye {
  width: calc(var(--pet-size) * 0.1);
  height: calc(var(--pet-size) * 0.1);
  background: var(--pet-primary);
  border-radius: 50%;
  position: relative;
  transition: all 0.2s ease;
}
.eye::after {
  content: '';
  position: absolute;
  width: 35%; height: 35%;
  background: white;
  border-radius: 50%;
  top: 15%; right: 15%;
}
.mouth {
  position: absolute;
  bottom: 2px;
  width: calc(var(--pet-size) * 0.1);
  height: calc(var(--pet-size) * 0.04);
  background: var(--pet-primary-dark);
  border-radius: 0 0 50% 50%;
  transition: all 0.2s ease;
}

/* Body frame */
.body-frame {
  width: calc(var(--pet-size) * 0.5);
  height: calc(var(--pet-size) * 0.2);
  border: 2px solid var(--pet-primary);
  border-radius: 0 0 12px 12px;
  border-top: none;
  position: relative;
  display: flex; align-items: flex-end; justify-content: center;
  gap: 4px; padding-bottom: 2px;
  transition: border-color 0.5s ease;
}
.leg {
  width: calc(var(--pet-size) * 0.06);
  height: calc(var(--pet-size) * 0.08);
  background: var(--pet-primary);
  border-radius: 0 0 4px 4px;
  transition: background 0.5s ease;
}

/* Arms */
.arms {
  display: flex; justify-content: space-between;
  width: calc(var(--pet-size) * 0.65);
  margin-top: -4px;
}
.arm {
  width: calc(var(--pet-size) * 0.06);
  height: calc(var(--pet-size) * 0.14);
  background: var(--pet-primary);
  border-radius: 4px;
  transform-origin: top center;
  transition: background 0.5s ease, transform 0.3s ease;
}

/* ===== SPEECH BUBBLE ===== */
.bubble {
  position: absolute;
  top: -36px; left: 50%;
  transform: translateX(-50%);
  background: rgba(30, 30, 46, 0.92);
  color: #e0e0e0;
  font-family: 'JetBrains Mono', 'Consolas', monospace;
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 10px;
  white-space: nowrap;
  opacity: 0;
  transition: opacity 0.3s ease;
  pointer-events: none;
  border: 1px solid var(--pet-primary);
}
.bubble.show { opacity: 1; }
.bubble::after {
  content: '';
  position: absolute;
  bottom: -5px; left: 50%;
  transform: translateX(-50%);
  border-left: 5px solid transparent;
  border-right: 5px solid transparent;
  border-top: 5px solid rgba(30, 30, 46, 0.92);
}

/* ===== PARTICLES ===== */
.particle {
  position: absolute;
  pointer-events: none;
  font-size: 14px;
  animation: particleFly 1s ease-out forwards;
  opacity: 0;
}
@keyframes particleFly {
  0% { opacity: 1; transform: translate(0, 0) scale(1); }
  100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0.3); }
}

/* ===== STATE ANIMATIONS ===== */

/* Idle - gentle floating */
@keyframes idleFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}
.state-idle #pet-container { animation: idleFloat 3s ease-in-out infinite; }
.state-idle .eye {
  height: calc(var(--pet-size) * 0.03);
  border-radius: 50%;
}
.state-idle .mouth { opacity: 0; }

/* Thinking - pulsing glow */
@keyframes thinkPulse {
  0%, 100% { text-shadow: 0 0 12px var(--pet-glow); }
  50% { text-shadow: 0 0 28px var(--pet-primary), 0 0 40px var(--pet-glow); }
}
@keyframes thinkBlink {
  0%, 40%, 100% { transform: scaleY(1); }
  45% { transform: scaleY(0.1); }
}
.state-thinking .sparkle { animation: thinkPulse 1.5s ease-in-out infinite; }
.state-thinking .eye { animation: thinkBlink 2.5s ease-in-out infinite; }
.state-thinking .eye {
  width: calc(var(--pet-size) * 0.12);
  height: calc(var(--pet-size) * 0.12);
}

/* Coding - typing motion */
@keyframes codeType {
  0%, 100% { transform: rotate(0deg); }
  25% { transform: rotate(-8deg); }
  75% { transform: rotate(8deg); }
}
@keyframes codeBounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-3px); }
}
.state-coding .arm { animation: codeType 0.4s ease-in-out infinite; }
.state-coding #pet-container { animation: codeBounce 0.8s ease-in-out infinite; }
.state-coding .eye::after { width: 25%; height: 25%; }

/* Done - celebration */
@keyframes doneJump {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  30% { transform: translateY(-16px) rotate(-5deg); }
  60% { transform: translateY(-8px) rotate(5deg); }
}
@keyframes waveArm {
  0%, 100% { transform: rotate(0deg); }
  25% { transform: rotate(-30deg); }
  75% { transform: rotate(30deg); }
}
.state-done #pet-container { animation: doneJump 0.8s ease-out; }
.state-done .arm:first-child { animation: waveArm 0.5s ease-in-out 3; }
.state-done .mouth {
  width: calc(var(--pet-size) * 0.12);
  height: calc(var(--pet-size) * 0.06);
  border-radius: 0 0 50% 50%;
}

/* Error - shake + distress */
@keyframes errorShake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-4px); }
  40% { transform: translateX(4px); }
  60% { transform: translateX(-3px); }
  80% { transform: translateX(3px); }
}
.state-error #pet-container { animation: errorShake 0.5s ease-in-out 3; }
.state-error .eye {
  width: calc(var(--pet-size) * 0.13);
  height: calc(var(--pet-size) * 0.13);
  background: #ff6b6b;
}
.state-error .mouth {
  border-radius: 50% 50% 0 0;
  height: calc(var(--pet-size) * 0.05);
}

/* Greeting - wave */
@keyframes greetWave {
  0%, 100% { transform: rotate(0deg); }
  15% { transform: rotate(-25deg); }
  30% { transform: rotate(25deg); }
  45% { transform: rotate(-20deg); }
  60% { transform: rotate(20deg); }
}
@keyframes greetBounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}
.state-greeting .arm:last-child { animation: greetWave 1s ease-in-out 2; }
.state-greeting #pet-container { animation: greetBounce 1s ease-in-out 2; }

/* Dragged - surprised */
@keyframes dragShake {
  0%, 100% { transform: rotate(0deg); }
  25% { transform: rotate(-5deg); }
  75% { transform: rotate(5deg); }
}
@keyframes legKick {
  0%, 100% { transform: rotate(0deg); }
  25% { transform: rotate(-15deg); }
  75% { transform: rotate(15deg); }
}
.state-dragged #pet-container { animation: dragShake 0.3s ease-in-out infinite; }
.state-dragged .eye {
  width: calc(var(--pet-size) * 0.14);
  height: calc(var(--pet-size) * 0.14);
}
.state-dragged .leg { animation: legKick 0.3s ease-in-out infinite; }
.state-dragged .mouth {
  width: calc(var(--pet-size) * 0.08);
  height: calc(var(--pet-size) * 0.08);
  border-radius: 50%;
}

/* Landing bounce */
@keyframes landBounce {
  0% { transform: translateY(-10px) scaleY(0.9); }
  40% { transform: translateY(4px) scaleY(1.1) scaleX(0.95); }
  70% { transform: translateY(-2px) scaleY(0.98); }
  100% { transform: translateY(0) scaleY(1) scaleX(1); }
}
.state-landing #pet-container { animation: landBounce 0.4s ease-out; }

/* ===== MINIMIZED ===== */
.minimized .claude-body > *:not(.sparkle) { display: none; }
.minimized .sparkle { font-size: 18px; }
.minimized .bubble { display: none; }

/* ===== CONTEXT MENU ===== */
#context-menu {
  display: none;
  position: fixed;
  background: rgba(20, 20, 32, 0.96);
  border: 1px solid rgba(203, 190, 255, 0.3);
  border-radius: 10px;
  padding: 6px 0;
  min-width: 180px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  z-index: 10000;
  font-family: 'Pretendard', -apple-system, sans-serif;
  font-size: 13px;
  color: #e0e0e0;
  backdrop-filter: blur(12px);
}
#context-menu.show { display: block; }
.menu-item {
  padding: 8px 16px;
  cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  transition: background 0.15s ease;
}
.menu-item:hover { background: rgba(203, 190, 255, 0.15); }
.menu-separator { height: 1px; background: rgba(255,255,255,0.08); margin: 4px 0; }
.menu-label {
  padding: 4px 16px 2px;
  font-size: 10px;
  color: rgba(255,255,255,0.35);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.color-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  border: 2px solid transparent;
  transition: border-color 0.2s;
}
.color-dot.active { border-color: white; }
.menu-submenu { padding-left: 32px; }

/* ===== DUST PARTICLES ===== */
.dust {
  position: absolute;
  width: 4px; height: 4px;
  background: var(--pet-primary);
  border-radius: 50%;
  opacity: 0;
  pointer-events: none;
}
@keyframes dustPoof {
  0% { opacity: 0.8; transform: translate(0, 0) scale(1); }
  100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0); }
}
</style>
</head>
<body>

<!-- Speech Bubble -->
<div class="bubble" id="bubble"></div>

<!-- Pet Container -->
<div id="pet-container">
  <div class="claude-body">
    <div class="sparkle">✻</div>
    <div class="face">
      <div class="eye left-eye"></div>
      <div class="eye right-eye"></div>
      <div class="mouth"></div>
    </div>
    <div class="arms">
      <div class="arm left-arm"></div>
      <div class="arm right-arm"></div>
    </div>
    <div class="body-frame">
      <div class="leg left-leg"></div>
      <div class="leg right-leg"></div>
    </div>
  </div>
</div>

<!-- Context Menu -->
<div id="context-menu">
  <div class="menu-label">Color</div>
  <div class="menu-item color-option" data-color="#cbbeff"><span class="color-dot active" style="background:#cbbeff"></span> Violet (default)</div>
  <div class="menu-item color-option" data-color="#88d6af"><span class="color-dot" style="background:#88d6af"></span> Mint</div>
  <div class="menu-item color-option" data-color="#d6c865"><span class="color-dot" style="background:#d6c865"></span> Gold</div>
  <div class="menu-item color-option" data-color="#ffb4ab"><span class="color-dot" style="background:#ffb4ab"></span> Coral</div>
  <div class="menu-item color-option" data-color="#7eb8da"><span class="color-dot" style="background:#7eb8da"></span> Ocean</div>
  <div class="menu-item color-option" data-color="#ff9ecf"><span class="color-dot" style="background:#ff9ecf"></span> Pink</div>
  <div class="menu-separator"></div>
  <div class="menu-label">Size</div>
  <div class="menu-item size-option" data-size="80">Small (80px)</div>
  <div class="menu-item size-option" data-size="120">Normal (120px)</div>
  <div class="menu-item size-option" data-size="160">Large (160px)</div>
  <div class="menu-separator"></div>
  <div class="menu-label">State (demo)</div>
  <div class="menu-item state-option" data-state="idle">Idle</div>
  <div class="menu-item state-option" data-state="thinking">Thinking</div>
  <div class="menu-item state-option" data-state="coding">Coding</div>
  <div class="menu-item state-option" data-state="done">Done!</div>
  <div class="menu-item state-option" data-state="error">Error</div>
  <div class="menu-item state-option" data-state="greeting">Greeting</div>
  <div class="menu-separator"></div>
  <div class="menu-item" id="btn-minimize">Minimize</div>
  <div class="menu-item" id="btn-reset-pos">Reset position</div>
</div>

<script>
// ===== CONFIG =====
const SPINNER_SYMBOLS = ['·', '✢', '✳', '✶', '✻', '✽'];
const ACTIVITY_WORDS = [
  'humming...', 'stargazing...', 'foraging...', 'fluttering...',
  'sparking...', 'strolling...', 'snuggling...', 'frolicking...',
  'thinking...', 'coding...', 'dreaming...', 'computing...',
];
const CODE_PARTICLES = ['{', '}', '<', '>', '/', ';', '(', ')', '=', '+'];
const DONE_PARTICLES = ['✦', '✧', '⭐', '✻', '✶', '✳', '·'];
const ERROR_PARTICLES = ['!', '?', '#', '×', '⚠'];

// ===== STATE MACHINE =====
const pet = document.getElementById('pet-container');
const bubble = document.getElementById('bubble');
const menu = document.getElementById('context-menu');

let currentState = 'greeting';
let isDragging = false;
let isMinimized = false;
let dragOffsetX = 0, dragOffsetY = 0;
let petX = 100, petY = 100;
let bubbleTimer = null;
let particleInterval = null;
let spinnerIndex = 0;

// ===== INIT =====
function init() {
  // Load saved settings
  const saved = JSON.parse(localStorage.getItem('claude-pet-settings') || '{}');
  if (saved.color) setColor(saved.color);
  if (saved.size) setSize(saved.size);
  if (saved.x != null && saved.y != null) {
    petX = Math.min(saved.x, window.innerWidth - 60);
    petY = Math.min(saved.y, window.innerHeight - 60);
  } else {
    petX = window.innerWidth - 180;
    petY = window.innerHeight - 200;
  }
  updatePosition();

  // Start with greeting
  setState('greeting');
  showBubble('Hello! ✻');

  // After greeting, go idle
  setTimeout(() => {
    if (currentState === 'greeting') setState('idle');
  }, 3000);

  // Try connecting to Tauri backend
  connectTauri();
}

// ===== POSITION =====
function updatePosition() {
  pet.style.left = petX + 'px';
  pet.style.top = petY + 'px';
  // Bubble follows pet
  bubble.style.left = (petX + pet.offsetWidth / 2) + 'px';
  bubble.style.top = (petY - 8) + 'px';
}

function snapToEdge() {
  const snap = 15;
  const w = window.innerWidth;
  const h = window.innerHeight;
  const pw = pet.offsetWidth;
  const ph = pet.offsetHeight;

  if (petX < snap) petX = 0;
  if (petY < snap) petY = 0;
  if (petX + pw > w - snap) petX = w - pw;
  if (petY + ph > h - snap) petY = h - ph;

  // Clamp to viewport
  petX = Math.max(0, Math.min(petX, w - pw));
  petY = Math.max(0, Math.min(petY, h - ph));
}

function saveSettings() {
  const root = document.documentElement;
  localStorage.setItem('claude-pet-settings', JSON.stringify({
    color: root.style.getPropertyValue('--pet-primary').trim() || '#cbbeff',
    size: parseInt(root.style.getPropertyValue('--pet-size')) || 120,
    x: petX, y: petY,
  }));
}

// ===== STATE MANAGEMENT =====
function setState(state) {
  if (currentState === state && state !== 'done') return;

  // Clear previous state
  document.body.className = '';
  clearParticles();

  currentState = state;
  document.body.classList.add('state-' + state);

  // State-specific behavior
  switch (state) {
    case 'idle':
      showBubbleRandom(['zZz', '...', '💤', 'idle~'], 5000);
      break;
    case 'thinking':
      startSpinner();
      showBubble('thinking...');
      break;
    case 'coding':
      startCodeParticles();
      showBubbleRandom(ACTIVITY_WORDS, 4000);
      break;
    case 'done':
      burstParticles(DONE_PARTICLES, 12);
      showBubble('Done! ✦');
      setTimeout(() => { if (currentState === 'done') setState('idle'); }, 4000);
      break;
    case 'error':
      burstParticles(ERROR_PARTICLES, 8);
      showBubble('Error! ⚠');
      setTimeout(() => { if (currentState === 'error') setState('idle'); }, 5000);
      break;
    case 'greeting':
      showBubble('Hello! ✻');
      break;
    case 'dragged':
      showBubble('Whoa!');
      break;
    case 'landing':
      spawnDust();
      setTimeout(() => {
        document.body.classList.remove('state-landing');
        setState('idle');
      }, 500);
      break;
  }
}

// ===== BUBBLE =====
function showBubble(text, duration = 3000) {
  if (bubbleTimer) clearTimeout(bubbleTimer);
  bubble.textContent = text;
  bubble.classList.add('show');
  updatePosition();
  bubbleTimer = setTimeout(() => {
    bubble.classList.remove('show');
  }, duration);
}

function showBubbleRandom(texts, interval) {
  showBubble(texts[Math.floor(Math.random() * texts.length)]);
  if (currentState === 'idle' || currentState === 'coding') {
    setTimeout(() => {
      if (currentState === 'idle' || currentState === 'coding') {
        showBubbleRandom(texts, interval);
      }
    }, interval + Math.random() * 3000);
  }
}

// ===== SPINNER =====
function startSpinner() {
  let i = 0;
  clearParticles();
  particleInterval = setInterval(() => {
    const sym = SPINNER_SYMBOLS[i % SPINNER_SYMBOLS.length];
    showBubble(sym + ' thinking...', 2000);
    i++;
  }, 300);
}

// ===== PARTICLES =====
function spawnParticle(symbol, x, y) {
  const el = document.createElement('div');
  el.className = 'particle';
  el.textContent = symbol;
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  el.style.color = getComputedStyle(document.documentElement).getPropertyValue('--pet-primary');
  const angle = Math.random() * Math.PI * 2;
  const dist = 30 + Math.random() * 50;
  el.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
  el.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

function burstParticles(symbols, count) {
  const cx = petX + pet.offsetWidth / 2;
  const cy = petY + pet.offsetHeight / 2;
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      spawnParticle(
        symbols[Math.floor(Math.random() * symbols.length)],
        cx + (Math.random() - 0.5) * 30,
        cy + (Math.random() - 0.5) * 30
      );
    }, i * 60);
  }
}

function startCodeParticles() {
  clearParticles();
  particleInterval = setInterval(() => {
    if (currentState !== 'coding') { clearParticles(); return; }
    const cx = petX + pet.offsetWidth / 2;
    const cy = petY + pet.offsetHeight * 0.3;
    spawnParticle(
      CODE_PARTICLES[Math.floor(Math.random() * CODE_PARTICLES.length)],
      cx + (Math.random() - 0.5) * 40, cy
    );
  }, 600);
}

function clearParticles() {
  if (particleInterval) {
    clearInterval(particleInterval);
    particleInterval = null;
  }
}

function spawnDust() {
  const cx = petX + pet.offsetWidth / 2;
  const bottom = petY + pet.offsetHeight;
  for (let i = 0; i < 6; i++) {
    const d = document.createElement('div');
    d.className = 'dust';
    d.style.left = cx + 'px';
    d.style.top = bottom + 'px';
    const angle = Math.PI + (Math.random() - 0.5) * Math.PI * 0.8;
    const dist = 10 + Math.random() * 20;
    d.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
    d.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
    d.style.animation = `dustPoof 0.5s ease-out forwards`;
    document.body.appendChild(d);
    setTimeout(() => d.remove(), 600);
  }
}

// ===== DRAG =====
pet.addEventListener('mousedown', (e) => {
  if (e.button === 2) return; // right-click → context menu
  isDragging = true;
  dragOffsetX = e.clientX - petX;
  dragOffsetY = e.clientY - petY;
  setState('dragged');
  e.preventDefault();
});

document.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  petX = e.clientX - dragOffsetX;
  petY = e.clientY - dragOffsetY;
  updatePosition();
});

document.addEventListener('mouseup', () => {
  if (!isDragging) return;
  isDragging = false;
  snapToEdge();
  updatePosition();
  saveSettings();
  setState('landing');
});

// Double-click to minimize/restore
pet.addEventListener('dblclick', () => {
  isMinimized = !isMinimized;
  pet.classList.toggle('minimized', isMinimized);
});

// Single click reaction
pet.addEventListener('click', (e) => {
  if (currentState === 'dragged' || currentState === 'landing') return;
  // Poke reaction
  showBubble(['!', 'Hey!', '✻', 'Hmm?', '◕‿◕'][Math.floor(Math.random() * 5)], 1500);
  burstParticles(['✻', '·'], 3);
});

// ===== CONTEXT MENU =====
pet.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  menu.style.left = Math.min(e.clientX, window.innerWidth - 200) + 'px';
  menu.style.top = Math.min(e.clientY, window.innerHeight - 400) + 'px';
  menu.classList.add('show');
});

document.addEventListener('click', (e) => {
  if (!menu.contains(e.target)) {
    menu.classList.remove('show');
  }
});

// Color options
document.querySelectorAll('.color-option').forEach(item => {
  item.addEventListener('click', () => {
    const color = item.dataset.color;
    setColor(color);
    // Update active dot
    document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
    item.querySelector('.color-dot').classList.add('active');
    menu.classList.remove('show');
    saveSettings();
    burstParticles(['✻', '✶', '·'], 8);
  });
});

// Size options
document.querySelectorAll('.size-option').forEach(item => {
  item.addEventListener('click', () => {
    setSize(parseInt(item.dataset.size));
    menu.classList.remove('show');
    saveSettings();
  });
});

// State demo options
document.querySelectorAll('.state-option').forEach(item => {
  item.addEventListener('click', () => {
    setState(item.dataset.state);
    menu.classList.remove('show');
  });
});

// Minimize button
document.getElementById('btn-minimize').addEventListener('click', () => {
  isMinimized = !isMinimized;
  pet.classList.toggle('minimized', isMinimized);
  menu.classList.remove('show');
});

// Reset position
document.getElementById('btn-reset-pos').addEventListener('click', () => {
  petX = window.innerWidth - 180;
  petY = window.innerHeight - 200;
  updatePosition();
  saveSettings();
  menu.classList.remove('show');
});

// ===== COLOR & SIZE =====
function setColor(hex) {
  const root = document.documentElement;
  root.style.setProperty('--pet-primary', hex);
  // Compute darker variant
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  const dark = '#' + [r,g,b].map(c => Math.max(0, c - 40).toString(16).padStart(2,'0')).join('');
  root.style.setProperty('--pet-primary-dark', dark);
  root.style.setProperty('--pet-glow', hex + '66');
}

function setSize(px) {
  document.documentElement.style.setProperty('--pet-size', px + 'px');
}

// ===== TAURI BRIDGE =====
function connectTauri() {
  // Check if running inside Tauri
  if (window.__TAURI__) {
    const { listen } = window.__TAURI__.event;
    const { invoke } = window.__TAURI__.core;

    listen('claude-status-update', (event) => {
      const status = event.payload;
      if (isDragging) return;

      switch (status.state) {
        case 'Idle': setState('idle'); break;
        case 'Thinking': setState('thinking'); break;
        case 'Coding': setState('coding'); break;
        case 'Done': setState('done'); break;
        case 'Error': setState('error'); break;
      }
    });

    console.log('Connected to Tauri backend');
  } else {
    console.log('Running in browser mode (demo)');
    // Demo: cycle through states
    startDemoCycle();
  }
}

function startDemoCycle() {
  // In browser mode, auto-cycle states for demo
  const states = ['idle', 'thinking', 'coding', 'done', 'idle'];
  let idx = 0;
  setInterval(() => {
    if (isDragging) return;
    // Only auto-cycle if user hasn't manually set a state recently
  }, 8000);
}

// ===== KEYBOARD SHORTCUT =====
document.addEventListener('keydown', (e) => {
  // Ctrl+Shift+P: toggle visibility
  if (e.ctrlKey && e.shiftKey && e.key === 'P') {
    pet.style.display = pet.style.display === 'none' ? 'block' : 'none';
    bubble.style.display = pet.style.display;
  }
});

// ===== WINDOW RESIZE =====
window.addEventListener('resize', () => {
  snapToEdge();
  updatePosition();
});

// ===== START =====
init();
</script>
